author: Codex
delete-after: True
changes:
  - rscadd: "В Create Human AI добавлены HALO-инсургенты и чекбокс разрешения поддержки под землей в Game Rule Panel."
  - qol: "Расширены HALO AI-фразы по принадлежности и переведены видимые имена HALO-контента для сангхейли, унггоев и инсургентов."
  - bugfix: "Исправлена локализационная регрессия limb-логики: шины снова ставятся на сломанные части тела, а взрывы тел больше не спамят debug-логами о неверных именах конечностей."
  - bugfix: "Исправлены стоящие после смерти сангхейли и регрессии посадки и высадки из HALO-техники, из-за которых водитель и стрелок могли застревать или некорректно занимать места."
  - bugfix: "HALO-медики теперь получают fireteam-распределение и доступ к нужным вендорам, в хим-вендор добавлен biofoam, а HALO job lockers ограничены одним набором на игрока."
